name: Hang Seng Index Daily Tracker

on:
  schedule:
    # 這裡使用 UTC 時間。UTC 09:00 = 台灣時間 17:00 (每週一到週五)
    - cron: '0 7 * * 1-5'
  workflow_dispatch: 

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' 

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas matplotlib requests deep-translator

    - name: Run HSI Tracker
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: |
        # 確保檔名與你上傳的 Python 檔名一致
        python hsi_tracker_all.py
